name: Update Player Descriptions

on:
  schedule:
    # 12 PM UTC = 7 AM EST / 8 AM EDT — runs Monday after stats + EROSP have updated
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  update-descriptions:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./cba-site

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cba-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate player descriptions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run generate-descriptions -- --top 400

      - name: Commit updated descriptions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/player-descriptions.json
          if git diff --staged --quiet; then
            echo "No changes to player descriptions"
          else
            git commit -m "chore: update player descriptions [skip ci]"
            git push
          fi
