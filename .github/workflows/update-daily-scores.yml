name: Update Daily Player Scores

on:
  schedule:
    # 10:00 AM UTC = 5:00 AM EST / 6:00 AM EDT
    # Runs before update-stats.yml (10:30 UTC) so the daily cache is ready
    # for weekly aggregation. All MLB games from the prior day are finalized by this time.
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update-daily-scores:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./cba-site

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cba-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Capture daily player scores
        env:
          ESPN_LEAGUE_ID: 1562795298
          ESPN_SEASON_ID: 2026
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
        run: npm run fetch-daily-scores

      - name: Commit updated daily scores
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/current/daily-scores-2026.json
          if git diff --staged --quiet; then
            echo "No new periods to commit"
          else
            git commit -m "chore: capture daily player scores [skip ci]"
            git push
          fi
