name: Update EROSP on Prospect Call-Up

# Triggers when check_prospect_callups.py writes the recompute flag file
# (committed by update-prospect-callups.yml without [skip ci]).
# Also supports manual dispatch for ad-hoc reruns.
on:
  push:
    branches: [main]
    paths:
      - 'cba-site/data/erosp/pending_callup_recompute.json'
  workflow_dispatch:

jobs:
  recompute-erosp:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./cba-site

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pybaseball data
        uses: actions/cache@v4
        with:
          path: ~/.pybaseball
          key: pybaseball-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            pybaseball-${{ runner.os }}-

      - name: Cache EROSP computation cache
        uses: actions/cache@v4
        with:
          path: cba-site/scripts/erosp_cache
          key: erosp-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            erosp-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pip install pybaseball pandas numpy requests python-mlb-statsapi

      - name: Log call-up trigger
        run: |
          echo "=== EROSP recompute triggered by prospect call-up ==="
          cat data/erosp/pending_callup_recompute.json

      - name: Run EROSP computation
        env:
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
        run: |
          cd scripts
          python3 compute_erosp.py

      - name: Commit updated EROSP data and delete flag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f data/erosp/pending_callup_recompute.json
          git add data/erosp/latest.json
          git add data/erosp/pending_callup_recompute.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: recompute EROSP after prospect call-up [skip ci]"
            git push
          fi
