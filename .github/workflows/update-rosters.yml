name: Update Rosters

on:
  schedule:
    # Every 3 days at 11:00 AM UTC (6:00 AM EST / 7:00 AM EDT)
    # Refreshes per-player ESPN position eligibility (e.g. C/1B, OF/DH)
    # which changes as players accumulate games at new positions during the season.
    - cron: '0 11 */3 * *'
  workflow_dispatch:

jobs:
  update-rosters:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch ESPN rosters and position eligibility
        env:
          ESPN_LEAGUE_ID: 1562795298
          ESPN_SEASON_ID: 2026
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
        run: npm run fetch-rosters

      - name: Commit updated rosters
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/current/2026.json
          if git diff --staged --quiet; then
            echo "No changes to roster data"
          else
            git commit -m "chore: update ESPN rosters and position eligibility [skip ci]"
            git push
          fi
