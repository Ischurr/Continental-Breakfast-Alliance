name: Update EROSP

on:
  schedule:
    # 11:00 AM UTC = 6:00 AM EST — 30 minutes after the stats update
    - cron: '0 11 * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

jobs:
  update-erosp:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pybaseball data
        uses: actions/cache@v4
        with:
          path: |
            ~/.pybaseball
            cba-site/scripts/erosp_cache
          # Refresh cache daily (game-day data changes)
          key: erosp-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            erosp-${{ runner.os }}-

      - name: Install Python dependencies
        run: pip install pybaseball pandas numpy requests python-mlb-statsapi

      - name: Run EROSP computation
        working-directory: cba-site/scripts
        run: python compute_erosp.py
        timeout-minutes: 45

      - name: Commit and push if output changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cba-site/data/erosp/latest.json
          if git diff --staged --quiet; then
            echo "No EROSP changes to commit."
          else
            git commit -m "Auto-update EROSP [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
