name: Update Stats

on:
  schedule:
    # 10:30 AM UTC = 5:30 AM EST / 6:30 AM EDT
    - cron: '30 10 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch current ESPN data
        env:
          ESPN_LEAGUE_ID: 1562795298
          ESPN_SEASON_ID: 2026
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
        run: npm run fetch-current

      - name: Fetch free agents
        env:
          ESPN_LEAGUE_ID: 1562795298
          ESPN_SEASON_ID: 2026
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
        run: npm run fetch-free-agents

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/current/2026.json data/current/free-agents.json
          if git diff --staged --quiet; then
            echo "No changes to ESPN data"
          else
            git commit -m "chore: update ESPN stats [skip ci]"
            git push
          fi
